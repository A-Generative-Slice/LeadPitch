name: 🦅 LeadPitch Autopilot

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 min
  push:
    branches: [ main ]
    paths-ignore:
      - 'clients.csv'
  workflow_dispatch:

# Prevent overlapping runs — if a previous run is still going, skip this one
concurrency:
  group: leadpitch-outreach
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔍 Verify Secrets
      run: |
        echo "Checking for required secrets..."
        if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then echo "❌ Missing OPENROUTER_API_KEY"; else echo "✅ OPENROUTER_API_KEY found"; fi
        if [ -z "${{ secrets.GH_TOKEN }}" ]; then echo "❌ Missing GH_TOKEN"; else echo "✅ GH_TOKEN found"; fi
        if [ -z "${{ secrets.SMTP_PASSWORD }}" ]; then echo "❌ Missing SMTP_PASSWORD"; else echo "✅ SMTP_PASSWORD found"; fi
        if [ -z "${{ secrets.SMTP_EMAIL }}" ]; then echo "❌ Missing SMTP_EMAIL"; else echo "✅ SMTP_EMAIL found"; fi

    - name: 🚀 Run Outreach (Drip Mode - 1 email per run)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        COMPANY_NAME: ${{ secrets.COMPANY_NAME }}
      run: |
        python3 main.py
